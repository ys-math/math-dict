name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate invariants
        run: python3 validate.py

      - name: dist/ is up to date with terms/
        run: |
          python3 build.py
          git diff --exit-code dist/ REVIEW.md || {
            echo "::error::dist/ or REVIEW.md is stale — run 'python3 build.py && python3 validate.py' and commit the result"
            exit 1
          }

      - name: Encodings are what each IME demands
        run: python3 check_dist.py
